services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: workflow_backend
      POSTGRES_USER: workflow_backend
      POSTGRES_PASSWORD: workflow_backend
    ports:
      - "25432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow_backend -d workflow_backend"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "26379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  redis_data:
